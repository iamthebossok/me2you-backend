const express = require("express");

const cors = require("cors");

const sqlite3 = require("sqlite3").verbose();

const bcrypt = require("bcryptjs");

const jwt = require("jsonwebtoken");

const Stripe = require("stripe");

const app = express();

// =======================

// CONFIG

// =======================

const PORT = process.env.PORT || 3000;

const stripe = Stripe(process.env.STRIPE_SECRET_KEY);

const JWT_SECRET = process.env.JWT_SECRET || "CHANGE_ME";

// =======================

// MIDDLEWARE

// =======================

app.use(cors());

app.use(express.json());

// =======================

// DATABASE

// =======================

const db = new sqlite3.Database("./thescripto.db");

db.serialize(() => {

  db.run(`

    CREATE TABLE IF NOT EXISTS users (

      id INTEGER PRIMARY KEY AUTOINCREMENT,

      username TEXT UNIQUE,

      password TEXT,

      paid INTEGER DEFAULT 0

    )

  `);

  db.run(`

    CREATE TABLE IF NOT EXISTS posts (

      id INTEGER PRIMARY KEY AUTOINCREMENT,

      userId INTEGER,

      content TEXT

    )

  `);

});

// =======================

// AUTH MIDDLEWARE

// =======================

function auth(req, res, next) {

  const token = req.headers.authorization;

  if (!token) return res.sendStatus(403);

  try {

    req.user = jwt.verify(token, JWT_SECRET);

    next();

  } catch {

    res.sendStatus(403);

  }

}

// =======================

// HEALTH CHECK

// =======================

app.get("/", (req, res) => {

  res.send("TheScripto backend is live 🚀");

});

// =======================

// REGISTER

// =======================

app.post("/api/register", async (req, res) => {

  const { username, password } = req.body;

  const hash = await bcrypt.hash(password, 10);

  db.run(

    "INSERT INTO users (username, password) VALUES (?, ?)",

    [username, hash],

    function (err) {

      if (err) return res.status(400).json({ error: "User exists" });

      res.json({ success: true });

    }

  );

});

// =======================

// LOGIN

// =======================

app.post("/api/login", (req, res) => {

  db.get(

    "SELECT * FROM users WHERE username = ?",

    [req.body.username],

    async (err, user) => {

      if (!user) return res.status(400).send("User not found");

      const valid = await bcrypt.compare(req.body.password, user.password);

      if (!valid) return res.status(403).send("Wrong password");

      const token = jwt.sign({ id: user.id }, JWT_SECRET);

      res.json({ token });

    }

  );

});

// =======================

// STRIPE PAYMENT (FIXED CORE ISSUE)

// =======================

app.post("/api/pay", auth, async (req, res) => {

  try {

    const session = await stripe.checkout.sessions.create({

      payment_method_types: ["card"],

      mode: "payment",

      line_items: [

        {

          price_data: {

            currency: "gbp",

            product_data: {

              name: "TheScripto Access"

            },

            unit_amount: 195

          },

          quantity: 1

        }

      ],

      success_url: "https://me2you-backend.onrender.com",

      cancel_url: "https://me2you-backend.onrender.com"

    });

    res.json({ url: session.url });

  } catch (err) {

    res.status(500).json({ error: err.message });

  }

});

// =======================

// POSTS SYSTEM

// =======================

app.post("/api/post", auth, (req, res) => {

  db.run(

    "INSERT INTO posts (userId, content) VALUES (?, ?)",

    [req.user.id, req.body.content]

  );

  res.json({ success: true });

});

app.get("/api/posts", (req, res) => {

  db.all("SELECT * FROM posts", [], (err, rows) => {

    res.json(rows);

  });

});

// =======================

// START SERVER

// =======================

app.listen(PORT, () => {

  console.log("TheScripto running on port " + PORT);

});
